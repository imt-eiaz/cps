name: CICD pipeline

on:
  push:
    branches: [main]

jobs:
  deploy_code:
    name: deploy_code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 🚀 STEP 1: Deploy FULL repo (not only frontend)
      - name: Deploy to AWS
        uses: easingthemes/ssh-deploy@v5.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SOURCE: "."
          REMOTE_HOST: ec2-52-71-253-131.compute-1.amazonaws.com
          REMOTE_USER: ubuntu
          TARGET: "/var/www/cps/"
          EXCLUDE: |
            node_modules
            .git
            .github

      # 🚀 STEP 2: Build everything on EC2
      - name: Build & Restart on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ec2-52-71-253-131.compute-1.amazonaws.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Ensure ubuntu can write to the deployment directory
            sudo chown -R ubuntu:ubuntu /var/www/cps
            sudo find /var/www/cps -type d -exec chmod 755 {} \;
            sudo find /var/www/cps -type f -exec chmod 644 {} \;

            echo "🔧 Backend setup"
            cd /var/www/cps/backend
            npm ci || npm install
            npm run build
            pm2 restart backend || pm2 start dist/index.js --name backend

            echo "🎨 Frontend setup"
            cd /var/www/cps/frontend
            rm -rf .next
            npm ci || npm install
            npm run build
            pm2 restart frontend || pm2 start npm --name frontend -- start

            echo "💾 Saving PM2"
            pm2 save
