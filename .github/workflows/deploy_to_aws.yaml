name: CICD pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------
      # 1. Checkout code
      # -----------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------
      # 2. Setup Node
      # -----------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------
      # 3. Install backend deps
      # -----------------------
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      # -----------------------
      # 4. Build backend
      # -----------------------
      - name: Build backend
        run: |
          cd backend
          npm run build

      # -----------------------
      # 5. Install + build frontend
      # -----------------------
      - name: Install & build frontend
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          NODE_OPTIONS=--max_old_space_size=1024 npm run build

      # -----------------------
      # 6. Prepare deployment package (IMPORTANT)
      # -----------------------
      - name: Prepare deploy folder
        run: |
          rm -rf deploy
          mkdir -p deploy/backend
          mkdir -p deploy/frontend

          # Backend (only build output)
          cp -r backend/dist deploy/backend/
          cp backend/package.json deploy/backend/

          # Frontend (production build only)
          cp -r frontend/.next deploy/frontend/
          cp frontend/package.json deploy/frontend/

      # -----------------------
      # 7. Deploy to EC2 (CLEAN ONLY)
      # -----------------------
      - name: Deploy to EC2
        uses: easingthemes/ssh-deploy@v5.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ec2-52-71-253-131.compute-1.amazonaws.com
          REMOTE_USER: ubuntu
          TARGET: "/var/www/cps/"

          # ONLY send production bundle
          SOURCE: "deploy/"

          EXCLUDE: |
            **/node_modules/**
            **/.git/**
            **/.github/**
            **/.next/cache/**
            **/*.log
