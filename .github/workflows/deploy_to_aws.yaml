name: CICD pipeline

on:
  push:
    branches: [main]

jobs:
  deploy_code:
    name: deploy_code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 🚀 STEP 1: Deploy FULL repo (not only frontend)
      - name: Deploy to AWS
        uses: easingthemes/ssh-deploy@v5.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SOURCE: "."
          REMOTE_HOST: ec2-52-71-253-131.compute-1.amazonaws.com
          REMOTE_USER: ubuntu
          TARGET: "/var/www/cps/"
          EXCLUDE: |
            node_modules
            .git
            .github

      # 🚀 STEP 2: Build everything on EC2
      - name: Build & Restart on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ec2-52-71-253-131.compute-1.amazonaws.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            # Ensure PATH has npm global bin (pm2 often lives here)
            export PATH="$PATH:$(npm bin -g 2>/dev/null || true)"

            echo "Node: $(node -v || true)"
            echo "NPM:  $(npm -v || true)"
            echo "PM2:  $(pm2 -v || true)"

            # Ensure ubuntu can write to the deployment directory
            sudo chown -R ubuntu:ubuntu /var/www/cps
            sudo find /var/www/cps -type d -exec chmod 755 {} \;
            sudo find /var/www/cps -type f -exec chmod 644 {} \;

            # --- Backend ---
            echo "🔧 Backend setup"
            cd /var/www/cps/backend

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            npm run build

            # Prefer ecosystem config if you have one; otherwise start the built entry
            if pm2 describe backend >/dev/null 2>&1; then
              pm2 restart backend
            else
              # use absolute path so pm2 doesn't depend on cwd
              pm2 start /var/www/cps/backend/dist/index.js --name backend
            fi

            # --- Frontend ---
            echo "🎨 Frontend setup"
            cd /var/www/cps/frontend
            rm -rf .next

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            npm run build

            if pm2 describe frontend >/dev/null 2>&1; then
              pm2 restart frontend
            else
              # run npm start under pm2 in a stable way
              pm2 start npm --name frontend -- start
            fi

            echo "💾 Saving PM2"
            pm2 save

            echo "✅ PM2 status"
            pm2 status || true
