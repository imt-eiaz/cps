name: CICD pipeline

on:
  push:
    branches: [main]

jobs:
  deploy_code:
    name: deploy_code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install all dependencies
        run: npm run install-all

      #  - name: Build client
      #   run: npm run build

      - name: Deploy to AWS
        uses: easingthemes/ssh-deploy@v5.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SOURCE: "."
          REMOTE_HOST: ec2-52-71-253-131.compute-1.amazonaws.com
          REMOTE_USER: "ubuntu"
          TARGET: "/var/www/cps/"

      - name: Restart server
        uses: appleboy/ssh-action@master
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          host: ec2-52-71-253-131.compute-1.amazonaws.com
          username: "ubuntu"
          script: "cd /var/www/cps/backend && npm run restart"
