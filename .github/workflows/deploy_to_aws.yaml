name: CICD pipeline

on:
  push:
    branches: [main]

jobs:
  deploy_code:
    name: deploy_code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm run install-all

      # ✅ STEP 1: Deploy files FIRST
      - name: Deploy to AWS
        uses: easingthemes/ssh-deploy@v5.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SOURCE: "."
          REMOTE_HOST: ec2-52-71-253-131.compute-1.amazonaws.com
          REMOTE_USER: ubuntu
          TARGET: "/var/www/cps/"
          EXCLUDE: |
            node_modules
            .next
            .git
            .github
            dist
            build

      # ✅ STEP 2: THEN build & restart
      - name: Build & Restart on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ec2-52-71-253-131.compute-1.amazonaws.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/cps/frontend

            echo "Installing dependencies"
            npm install

            echo "Building Next.js app"
            npm run build

            echo "Restarting frontend"
            pm2 restart frontend || pm2 start npm --name "frontend" -- start