# Production Nginx Configuration for Multi-Tenant SaaS Platform
# Supports wildcard subdomain routing: *.ventionz.com

# This configuration:
# - Routes subdomains to tenant-specific instances
# - Handles SSL/TLS with wildcard certificates
# - Implements rate limiting and caching
# - Provides gzip compression
# - Manages static assets
# - Routes to backend APIs based on subdomain

# ==================== UPSTREAM BACKENDS ====================

# Backend API servers
upstream backend_api {
    least_conn;
    server backend-1:5000 max_fails=3 fail_timeout=30s;
    server backend-2:5000 max_fails=3 fail_timeout=30s;
    server backend-3:5000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Frontend Next.js servers
upstream frontend_app {
    least_conn;
    server frontend-1:3000 max_fails=3 fail_timeout=30s;
    server frontend-2:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ==================== RATE LIMITING ====================

# Rate limit per IP: 100 requests per minute
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=300r/m;

# Rate limit per tenant: 500 requests per minute
limit_req_zone $http_x_tenant_id zone=tenant_limit:10m rate=500r/m;

# ==================== CACHING ====================

# Cache static assets for 1 year
proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m max_size=1g inactive=365d use_temp_path=off;

# Cache API responses (short term)
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=5m use_temp_path=off;

# ==================== LOGGING ====================

# Define log format with tenant info
log_format multi_tenant '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'tenant=$http_x_tenant_id subdomain=$subdomain latency=$request_time ms';

access_log /var/log/nginx/access.log multi_tenant;
error_log /var/log/nginx/error.log warn;

# ==================== HTTP REDIRECT ====================

server {
    listen 80;
    listen [::]:80;
    server_name ~^(?<subdomain>.+\.)?ventionz\.com$ ~^localhost:3000$;

    # Redirect all HTTP to HTTPS (except for certbot challenges)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ==================== HTTPS SERVER ====================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Match all subdomains: *.ventionz.com and ventionz.com
    server_name ~^(?<subdomain>.+\.)?ventionz\.com$;

    # SSL Certificate Configuration (Wildcard Cert)
    ssl_certificate /etc/letsencrypt/live/ventionz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ventionz.com/privkey.pem;

    # SSL Configuration - Best Practices
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_min_length 1000;

    # ==================== API ROUTES ====================

    location ~ ^/api/(.*)$ {
        # Rate limiting
        limit_req zone=api_limit burst=10 nodelay;
        limit_req zone=tenant_limit burst=50 nodelay;

        # Proxy configuration
        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Tenant-Subdomain $subdomain;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Cache GET requests (except auth endpoints)
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$scheme$request_method$host$request_uri$http_x_tenant_id";
        proxy_cache_bypass $http_pragma $http_authorization;

        # Add cache status header for debugging
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # ==================== HEALTH CHECK ====================

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location /api/health {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # ==================== STATIC FILES ====================

    location ~* ^/(static|public)/ {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static files
        proxy_cache static_cache;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # ==================== NEXT.JS APP ====================

    location ~ ^/(_next|vercel) {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-Subdomain $subdomain;

        # Cache Next.js builds
        proxy_cache static_cache;
        proxy_cache_valid 200 1d;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # ==================== ROOT / ====================

    location / {
        # Rate limiting for general requests
        limit_req zone=general_limit burst=20 nodelay;

        # Proxy to frontend
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Tenant-Subdomain $subdomain;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable caching for HTML
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ==================== ERROR PAGES ====================

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ==================== PLATFORM ADMIN DASHBOARD ====================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name admin.ventionz.com;

    ssl_certificate /etc/letsencrypt/live/ventionz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ventionz.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Admin dashboard only accessible from specific IPs (optional)
    # allow 203.0.113.0/24;  # Your office IP range
    # deny all;

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Is-Admin "true";
    }

    location ~ ^/api/(.*)$ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Is-Admin "true";
    }
}

# ==================== STATS AND MONITORING ====================

server {
    listen 8080;
    listen [::]:8080;

    server_name _;
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow ::1;
        deny all;
    }
}
